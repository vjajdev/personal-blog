<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Blog & Portfolio</title>
  </head>
  <body>
    <script>
      window.onerror = function(msg, url, line, col, error) {
        document.body.innerHTML = '<div style="color:red; padding: 20px; font-family: monospace;"><h1>Crucial Error Detected</h1><p>' + msg + '</p><p>' + url + ':' + line + '</p></div>';
        return false;
      };
      window.addEventListener('unhandledrejection', function(event) {
        document.body.innerHTML = '<div style="color:red; padding: 20px; font-family: monospace;"><h1>Unhandled Promise Rejection</h1><p>' + event.reason + '</p></div>';
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
